{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Create Topic - Community" %}{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-12">
    <div class="max-w-8xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="p-8 border-b border-gray-100 bg-gray-50/50">
                <h1 class="text-2xl font-extrabold text-gray-900">{% trans "Create New Topic" %}</h1>
                <p class="text-gray-500 mt-1">{% trans "Start a discussion with the community" %}</p>
            </div>
            
            <form method="post" class="p-8 space-y-6">
                {% csrf_token %}
                
                <!-- Title -->
                <div>
                    <label for="id_title" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Topic Title" %}</label>
                    <input type="text" name="title" id="id_title" class="w-full rounded-lg border-gray-300 focus:ring-[#0078D4] focus:border-[#0078D4] shadow-sm text-lg py-3" placeholder="{% trans "What's on your mind?" %}" required>
                </div>

                <!-- Category -->
                <div>
                     <label for="id_category" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Category" %}</label>
                     <select name="category" id="id_category" class="w-full rounded-lg border-gray-300 focus:ring-[#0078D4] focus:border-[#0078D4] shadow-sm">
                         <option value="">{% trans "Select a category" %}</option>
                         {% for cat in form.fields.category.queryset %}
                         <option value="{{ cat.id }}">{{ cat.name }}</option>
                         {% endfor %}
                     </select>
                </div>

                <!-- Content -->
                <div>
                     <label for="id_content" class="block text-sm font-medium text-gray-700 mb-1">{% trans "Content" %}</label>
                     <textarea name="content" id="id_content" rows="8" class="w-full rounded-lg border-gray-300 focus:ring-[#0078D4] focus:border-[#0078D4] shadow-sm" placeholder="{% trans 'Describe your topic in detail...' %}" required></textarea>
                </div>

                <div class="pt-4 flex items-center justify-end gap-3">
                    <a href="{% url 'community:index' %}" class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-colors">{% trans "Cancel" %}</a>
                    <button type="submit" class="px-8 py-2.5 bg-[#0078D4] text-white font-bold rounded-lg hover:bg-[#006cbd] shadow-lg shadow-blue-500/30 transition-all hover:-translate-y-0.5">
                        {% trans "Post Topic" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
